# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  cognitive-complexity:
    # Gate on SonarSource Cognitive Complexity (rule S3776). The opt-in
    # MeasureCognitiveComplexity build (see Directory.Build.props) enables only
    # S3776 with a per-method threshold of 15 (SonarLint.xml); WarningsAsErrors
    # escalates any method above it to a build error. Single-OS: the metric is
    # platform-independent, so there's no need to run it across the matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Cognitive Complexity gate (S3776 <= 15)
      run: dotnet build -p:MeasureCognitiveComplexity=true -p:WarningsAsErrors=S3776
