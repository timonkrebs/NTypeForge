# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Minimal GITHUB_TOKEN scope for the whole workflow: every job only checks out the repo and
# builds/tests/packs, so read-only access to contents is all the token needs (CodeQL hardening).
permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: ${{ runner.os }}-nuget-
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ${{ runner.temp }}/coverage
    - name: Coverage summary
      # Informational: never fail the job over coverage tooling. Surfaces the % in the run summary
      # and uploads a full report artifact; the test run above already gathered the data.
      if: always()
      shell: bash
      run: |
        files=$(find "${{ runner.temp }}/coverage" -name 'coverage.cobertura.xml' 2>/dev/null || true)
        [ -z "$files" ] && { echo "No coverage files found; skipping."; exit 0; }
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet tool install --global dotnet-reportgenerator-globaltool >/dev/null
        reportgenerator -reports:"${{ runner.temp }}/coverage/**/coverage.cobertura.xml" -targetdir:"${{ runner.temp }}/coverage/report" -reporttypes:"MarkdownSummaryGithub;Cobertura" >/dev/null
        cat "${{ runner.temp }}/coverage/report/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: ${{ runner.temp }}/coverage/report
        if-no-files-found: ignore

  cognitive-complexity:
    # Gate on SonarSource Cognitive Complexity (rule S3776). The opt-in
    # MeasureCognitiveComplexity build (see Directory.Build.props) enables only
    # S3776 with a per-method threshold of 15 (SonarLint.xml); WarningsAsErrors
    # escalates any method above it to a build error. Single-OS: the metric is
    # platform-independent, so there's no need to run it across the matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: ${{ runner.os }}-nuget-
    - name: Cognitive Complexity gate (S3776 <= 15)
      run: dotnet build -p:MeasureCognitiveComplexity=true -p:WarningsAsErrors=S3776

  pack:
    # Smoke-test the NuGet package: pack the runtime project (which also packs the generator into
    # analyzers/dotnet/cs) and assert the produced .nupkg actually contains both the runtime
    # assembly and the generator in the analyzer path - the layout a consuming project needs. This
    # catches a broken analyzer-packing setup here, before a release ships it.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: ${{ runner.os }}-nuget-
    - name: Pack
      run: dotnet pack src/NTypeForge/NTypeForge.csproj -c Release -o ${{ runner.temp }}/artifacts
    - name: Verify package layout
      shell: bash
      run: |
        pkg=$(ls ${{ runner.temp }}/artifacts/NTypeForge.*.nupkg | head -1)
        echo "Inspecting $pkg"
        contents=$(unzip -Z1 "$pkg")
        echo "$contents"
        check() { echo "$contents" | grep -qx "$1" || { echo "::error::missing from package: $1"; exit 1; }; }
        check 'lib/net10.0/NTypeForge.dll'
        check 'analyzers/dotnet/cs/NTypeForge.SourceGenerator.dll'
        check 'README.md'
        echo 'Package layout OK.'
    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: nupkg
        path: ${{ runner.temp }}/artifacts/*nupkg
